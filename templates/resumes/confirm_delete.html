{% extends 'base.html' %}
{% block title %}Delete Resume – ResumeForge{% endblock %}
{% block content %}
<section style="min-height:70vh;display:flex;align-items:center;padding:60px 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="rf-card text-center">
          <i class="fa-solid fa-triangle-exclamation" style="font-size:3rem;color:#ff6b6b;margin-bottom:1rem;display:block;"></i>
          <h4>Delete Resume?</h4>
          <p style="color:var(--muted);">Are you sure you want to delete "<strong style="color:var(--white)">{{ resume.title }}</strong>"? This action cannot be undone.</p>
          <div class="d-flex gap-3 justify-content-center mt-4">
            <form method="post">
              {% csrf_token %}
              <button type="submit" class="btn" style="background:rgba(255,107,107,0.15);color:#ff6b6b;border:1px solid rgba(255,107,107,0.4);border-radius:var(--radius);padding:10px 24px;font-weight:600;"><i class="fa-solid fa-trash me-2"></i>Yes, Delete</button>
            </form>
            <a href="{% url 'resume_detail' resume.pk %}" class="btn btn-rf-outline">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
